# Claude Code Skill Definition
# Multi-Role Project Management System

name: multi-role-project-init
id: multi-role-project-skill
version: 1.0.0
author: Community
license: MIT
homepage: https://github.com/findones/multi-role-project-skill

description: |
  Initialize multi-role project management system for large projects.

  Solves single-window context explosion by splitting projects into 4 focused windows:
  - 🧭 Architect: Design & decisions
  - 🔧 Engineer: Implementation & experiments
  - ✍️ Paper: Writing & narrative
  - 🔬 Repro: Research & references

  All windows sync via STATUS.md for clear decision tracking.

# How to invoke this skill in Claude Code
invocation:
  slash_command: "/multi-role-project-init"
  examples:
    - "/multi-role-project-init \"My ML Project\""
    - "/multi-role-project-init \"My Project\" --language zh"
    - "/multi-role-project-init \"My Project\" --roles architect,engineer"

# Command-line arguments
arguments:
  project_name:
    position: 1
    type: string
    required: true
    description: "Name of your project"
    example: "My ML Research Project"

  --language, -l:
    type: choice
    choices: ["en", "zh"]
    default: "en"
    description: "Documentation language (English or Chinese)"

  --roles, -r:
    type: string
    default: "architect,engineer,paper,repro"
    description: "Comma-separated roles to initialize"
    example: "architect,engineer"

  --output, -o:
    type: path
    default: "."
    description: "Output directory for templates"

# Files this skill creates
output_files:
  - STATUS.md
  - method.md
  - CODE_MAP.md
  - RESULTS.md
  - WORK_PLAN.md
  - docs/roles/architect.md
  - docs/roles/engineer.md
  - docs/roles/paper.md
  - docs/roles/repro.md

# Installation instructions for users
installation:
  global: |
    # Install globally (available in all projects)
    mkdir -p ~/.claude/skills/multi-role-project-skill
    git clone https://github.com/findones/multi-role-project-skill.git ~/.claude/skills/multi-role-project-skill

  project: |
    # Install in current project only
    mkdir -p .claude/skills/multi-role-project-skill
    cp -r [skill-path] .claude/skills/multi-role-project-skill

# Metadata
metadata:
  category: project-management
  tags:
    - project-management
    - multi-role
    - multi-window
    - ai-assisted
    - collaboration
    - organization

  languages:
    - en
    - zh

  supported_domains:
    - machine_learning
    - software_engineering
    - research
    - writing
    - product_development

# Performance characteristics
performance:
  initialization_time_seconds: 5
  learning_curve_minutes: 15
  output_quality: "Production-ready templates"
  context_improvement: "3-5x cleaner per window"

# Documentation
docs:
  readme: README.md
  installation: INSTALL.md
  usage: HOW_TO_INSTALL_SKILL.md

# Dependencies
dependencies:
  python: ">=3.7"

# Compatibility
compatibility:
  min_claude_code_version: "1.0.0"
  os:
    - linux
    - macos
    - windows
